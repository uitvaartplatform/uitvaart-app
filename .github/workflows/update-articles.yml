name: Nieuwste artikelen bijwerken

on:
  schedule:
    - cron: "0 5 * * *"   # elke dag rond 07:00 Nederlandse tijd
  workflow_dispatch: {}    # ook handmatig te starten via de Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repo ophalen
        uses: actions/checkout@v4

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Artikelen ophalen
        run: python update_articles.py

      - name: Wijzigingen vastleggen
        run: |
          if git status --porcelain articles.json | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add articles.json
            git commit -m "Nieuwste artikelen bijgewerkt"
            git push
          else
            echo "Geen wijzigingen in articles.json."
          fi
