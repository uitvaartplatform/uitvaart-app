<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Uitvaart-Platform App</title>
<meta name="theme-color" content="#4a1942">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Uitvaart-Platform">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --plum:#4a1942; --plum2:#6C3D5C; --orange:#e8834a; --orange2:#c8622a;
  --cream:#faf7f2; --cream2:#f3ece2; --ink:#2c1428; --muted:#8c7f88;
  --line:#ece2ec; --soft:#f6eef4; --lav:#c9bcd2; --green:#eaf3ec; --greentx:#3c7a52;
  --sans:'Poppins',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans); color:var(--ink); -webkit-font-smoothing:antialiased;
  background:radial-gradient(120% 80% at 80% 0%, #efe2ee 0%, transparent 55%), linear-gradient(150deg,#f3ecf2,#efe7e0);
  min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:26px 16px}
.cap{text-align:center; color:#6b5d68; margin-bottom:14px}
.cap .pill{display:inline-block; background:#fff; border:1px solid #e6dbe6; color:var(--plum2); font-size:.72rem; font-weight:600; padding:5px 12px; border-radius:20px; letter-spacing:.4px; margin-bottom:8px}
.cap p{font-size:.86rem} .cap b{color:var(--plum)}

.phone{position:relative; width:392px; height:min(848px,92vh); background:#160b14; border-radius:52px; padding:13px; box-shadow:0 40px 90px rgba(40,12,36,.4); flex:none}
.screen{position:relative; width:100%; height:100%; background:var(--cream); border-radius:40px; overflow:hidden; display:flex; flex-direction:column}
.island{position:absolute; top:9px; left:50%; transform:translateX(-50%); width:108px; height:30px; background:#160b14; border-radius:18px; z-index:80}
.status{height:46px; flex:none; display:flex; align-items:flex-end; justify-content:space-between; padding:0 26px 5px; font-size:.78rem; font-weight:600; z-index:50}
.status .r{display:flex; gap:6px; align-items:center}
.status svg{width:16px;height:16px}

.body{position:relative; flex:1; min-height:0}
.scr{position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; display:none; -webkit-overflow-scrolling:touch}
.scr.on{display:block; animation:fade .28s ease}
@keyframes fade{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
.scr::-webkit-scrollbar{width:0}
.pad{padding:18px 16px 26px}

.hd{position:sticky; top:0; z-index:20; background:linear-gradient(135deg,var(--plum),var(--plum2)); color:#fff; padding:16px 16px 17px; border-radius:0 0 22px 22px}
.hd .hrow{display:flex; align-items:center; gap:11px}
.hd .bf{width:28px; color:#fff; flex:none}
.hd h1{font-size:1.12rem; font-weight:600}
.hd .sub{font-size:.8rem; color:rgba(255,255,255,.78); margin-top:3px; font-weight:300; line-height:1.4}
.hd .menu{margin-left:auto; width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.16);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
.hd .menu svg{width:20px;height:20px}
.hd.simple{display:flex; align-items:center; gap:11px}
.back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.16);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
.back svg{width:18px;height:18px}

.tile{background:#fff; border:1px solid var(--line); border-radius:18px; padding:15px; cursor:pointer; transition:transform .15s, box-shadow .15s; text-align:left; width:100%}
.tile:hover{transform:translateY(-2px); box-shadow:0 10px 22px rgba(74,25,66,.08)}
.tile .ic{width:42px;height:42px;border-radius:13px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--plum);margin-bottom:10px}
.tile .ic svg{width:22px;height:22px}
.tile h3{font-size:.92rem;font-weight:600}
.tile p{font-size:.74rem;color:var(--muted);margin-top:3px;line-height:1.4}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.sect-t{font-size:.72rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--plum2);margin:24px 2px 12px;display:flex;align-items:center;justify-content:space-between}
.sect-t a{color:var(--orange);font-weight:600;font-size:.74rem;cursor:pointer;text-transform:none;letter-spacing:0}

.row{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid var(--line);border-radius:15px;padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:background .15s;width:100%;text-align:left}
.row:hover{background:var(--soft)}
.row .ic{width:40px;height:40px;border-radius:12px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--plum);flex:none}
.row .ic svg{width:20px;height:20px}
.row .tx{flex:1;min-width:0}
.row .tx h3{font-size:.9rem;font-weight:600}
.row .tx p{font-size:.74rem;color:var(--muted);margin-top:2px;line-height:1.35}
.row .ext{color:#c4b6c2;flex:none}
.row .ext svg{width:17px;height:17px}
.intro{font-size:.84rem;color:var(--muted);line-height:1.55;margin-bottom:14px}

/* artikelen */
.artcard{display:block;background:#fff;border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-bottom:13px;cursor:pointer;text-decoration:none;color:inherit}
.artcard .img{height:128px;background:var(--cream2) center/cover no-repeat;position:relative}
.artcard .cat{position:absolute;top:10px;left:10px;background:rgba(74,25,66,.9);color:#fff;font-size:.64rem;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.2px}
.artcard .c{padding:13px 15px 15px}
.artcard h3{font-size:.92rem;font-weight:600;line-height:1.35}
.artcard .date{font-size:.7rem;color:var(--muted);margin-top:6px}
.hscroll{display:flex;gap:12px;overflow-x:auto;margin:0 -16px;padding:0 16px 4px}
.hscroll::-webkit-scrollbar{height:0}
.hscroll .artcard{flex:none;width:230px;margin-bottom:4px}

/* product cards */
.prod{display:flex;gap:14px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:13px}
.prod .bk{width:64px;height:84px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:4px 4px 0 #e7d9e5}
.prod.tpg .bk{background:linear-gradient(135deg,var(--plum),var(--plum2))}
.prod.ui .bk{background:linear-gradient(135deg,var(--orange),var(--orange2))}
.prod .bk svg{width:28px;height:28px}
.prod .c{flex:1;min-width:0}
.prod h3{font-size:.96rem;font-weight:600}
.prod .pr{font-size:.8rem;font-weight:700;color:var(--orange2);margin:3px 0 6px}
.prod p{font-size:.74rem;color:var(--muted);line-height:1.45;margin-bottom:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border:none;font-family:var(--sans);font-weight:600;font-size:.82rem;padding:10px 18px;border-radius:24px;cursor:pointer;text-decoration:none;box-shadow:0 6px 16px rgba(200,98,42,.25)}
.btn.wide{width:100%}
.btn svg{width:15px;height:15px}

/* B2B card */
.b2b{background:linear-gradient(140deg,var(--plum),var(--plum2));color:#fff;border-radius:20px;padding:20px;position:relative;overflow:hidden;margin-bottom:13px}
.b2b .bfwm{position:absolute;right:-16px;bottom:-20px;width:110px;color:#fff;opacity:.1}
.b2b h3{font-size:1.05rem;font-weight:600;position:relative}
.b2b p{font-size:.8rem;color:rgba(255,255,255,.82);line-height:1.5;margin:8px 0 14px;font-weight:300;position:relative}

/* categorie grid */
.cats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
.catbtn{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 13px;cursor:pointer;font-family:var(--sans);font-size:.8rem;font-weight:500;color:var(--ink);text-align:left;display:flex;align-items:center;gap:9px;transition:background .15s,transform .15s,box-shadow .15s;text-decoration:none;min-width:0;overflow-wrap:anywhere}
.catbtn:hover{background:var(--soft)}
.catbtn .d{width:7px;height:7px;border-radius:50%;background:var(--orange);flex:none}
.searchbar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 15px;margin-bottom:14px;color:var(--muted)}
.searchbar svg{width:18px;height:18px;flex:none}.searchbar span{font-size:.85rem}

.trust{display:flex;gap:9px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:.76rem;color:#5f5360;line-height:1.4;margin-top:6px;cursor:pointer;text-decoration:none}
.trust svg{width:20px;height:20px;color:var(--plum2);flex:none}
.foot{text-align:center;font-size:.68rem;color:#a99ca6;margin-top:22px;line-height:1.5}

/* MENU overlay */
.ov{position:absolute;inset:0;z-index:90;display:none}
.ov.on{display:block}
.ov .bgd{position:absolute;inset:0;background:rgba(30,10,28,.45);animation:fade .2s}
.ov .panel{position:absolute;top:0;right:0;bottom:0;width:80%;max-width:300px;background:var(--cream);box-shadow:-10px 0 40px rgba(0,0,0,.2);overflow-y:auto;animation:slidein .26s ease;display:flex;flex-direction:column}
@keyframes slidein{from{transform:translateX(100%)}to{transform:none}}
.ov .mh{background:linear-gradient(135deg,var(--plum),var(--plum2));color:#fff;padding:18px 18px 16px;display:flex;align-items:center;gap:11px}
.ov .mh .bf{width:30px;color:#fff}
.ov .mh h2{font-size:1rem;font-weight:600}
.ov .mh .x{margin-left:auto;background:rgba(255,255,255,.16);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem}
.ov .ml{padding:8px 0}
.mitem{display:flex;align-items:center;gap:13px;padding:13px 18px;cursor:pointer;width:100%;background:none;border:none;font-family:var(--sans);font-size:.92rem;font-weight:500;color:var(--ink);text-align:left}
.mitem:hover{background:var(--soft)}
.mitem .ic{width:34px;height:34px;border-radius:10px;background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--plum);flex:none}
.mitem .ic svg{width:18px;height:18px}

.nav{flex:none;display:flex;background:#fff;border-top:1px solid var(--line);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:40}
.nav-item{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:#b3a6b1;font-family:var(--sans);font-size:.64rem;font-weight:600}
.nav-item svg{width:22px;height:22px}
.nav-item.act{color:var(--plum)}
.nav-item.act .nic{background:var(--soft)}
.nic{width:44px;height:27px;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:background .15s}

/* in-app calculator */
.cc-step{margin-bottom:16px}
.cc-lbl{display:flex;align-items:center;gap:8px;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--plum2);margin:2px 2px 10px}
.cc-lbl .num{width:18px;height:18px;border-radius:50%;background:var(--plum);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.62rem}
.cc-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.cc-opt{background:#fff;border:1.5px solid var(--line);border-radius:15px;padding:13px 6px;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--sans)}
.cc-opt.act{border-color:var(--orange);background:#fff8f3;box-shadow:0 4px 14px rgba(232,131,74,.14)}
.cc-opt .ic{font-size:1.35rem;line-height:1}
.cc-opt .nm{font-size:.75rem;font-weight:600;margin-top:5px;color:var(--ink)}
.cc-sel{width:100%;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:13px 14px;font-family:var(--sans);font-size:.9rem;font-weight:500;color:var(--ink)}
.cc-slid{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.cc-slid .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:.8rem;color:var(--muted);font-weight:500}
.cc-slid .v{background:#fff3ec;color:var(--orange2);font-weight:700;font-size:.95rem;padding:4px 14px;border-radius:10px}
.cc-slid input{width:100%;-webkit-appearance:none;height:6px;border-radius:5px;background:var(--cream2);outline:none}
.cc-slid input::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--orange);cursor:pointer;box-shadow:0 2px 8px rgba(200,98,42,.4)}
.cc-slid input::-moz-range-thumb{width:22px;height:22px;border:none;border-radius:50%;background:var(--orange);cursor:pointer}
.cc-total{background:linear-gradient(140deg,var(--plum),var(--plum2));color:#fff;border-radius:20px;padding:20px;margin:6px 0 14px}
.cc-total .l{font-size:.64rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7)}
.cc-total .big{font-size:2.4rem;font-weight:700;color:var(--orange);margin:5px 0 4px;letter-spacing:-1px}
.cc-total .s{font-size:.82rem;color:rgba(255,255,255,.85);font-weight:300}
.cc-dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.cc-db{background:#fff;border:1px solid var(--line);border-radius:15px;padding:13px 14px}
.cc-db .l{font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--plum2)}
.cc-db .v{font-size:1.25rem;font-weight:700;margin:3px 0}
.cc-db .s{font-size:.64rem;color:var(--muted);line-height:1.3}
.cc-verd{background:#fff;border:1px solid var(--line);border-radius:16px;padding:4px 16px 10px}
.cc-vt{font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--plum2);padding:12px 0 4px}
.cc-rij{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.cc-rij:last-child{border-bottom:none}
.cc-rij .n{font-size:.84rem;font-weight:500}
.cc-rij .n .tag{background:#fbe7da;color:var(--orange2);font-size:.56rem;font-weight:700;padding:2px 6px;border-radius:6px;margin-left:6px;vertical-align:middle}
.cc-rij .w{font-size:.86rem;font-weight:700;white-space:nowrap}
.cc-rij.tot{border-top:2px solid var(--plum);margin-top:2px;padding-top:13px}
.cc-rij.tot .n{font-weight:700;color:var(--plum)}
.cc-rij.tot .w{color:var(--orange2);font-size:1.05rem}

/* carrousel nieuwste artikelen */
.carousel{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--line);background:#fff;box-shadow:0 6px 18px rgba(74,25,66,.05)}
.car-track{display:flex;transition:transform .5s ease}
.car-slide{min-width:100%;position:relative;cursor:pointer}
.car-imgwrap{position:relative;height:210px;overflow:hidden;background:var(--cream2)}
.car-img{width:100%;height:100%;object-fit:cover;display:block}
.car-shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(44,20,40,.92) 0%,rgba(44,20,40,.35) 45%,transparent 75%)}
.car-cat{position:absolute;top:12px;left:12px;background:rgba(232,131,74,.95);color:#fff;font-size:.62rem;font-weight:700;letter-spacing:.3px;padding:4px 10px;border-radius:20px;text-transform:uppercase}
.car-txt{position:absolute;left:0;right:0;bottom:0;padding:14px 16px;color:#fff}
.car-txt h3{font-size:.96rem;font-weight:600;line-height:1.3;margin-bottom:5px;text-shadow:0 1px 6px rgba(0,0,0,.35)}
.car-txt .d{font-size:.72rem;color:rgba(255,255,255,.85)}
.car-dots{display:flex;justify-content:center;gap:7px;padding:12px 0 13px;background:#fff}
.car-dot{width:7px;height:7px;border-radius:50%;background:#dcd0da;border:none;cursor:pointer;padding:0;transition:background .2s,width .2s}
.car-dot.act{background:var(--orange);width:20px;border-radius:4px}
.footlinks{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:24px;font-size:.78rem}
.footlinks a{color:var(--plum2);font-weight:600;cursor:pointer}
.footlinks span{color:#c9bcc8}

/* sectie-subkop binnen hubs */
.sub-t{font-size:.72rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--plum2);margin:24px 4px 8px;padding-top:16px;border-top:1px solid var(--line)}
/* prominente tool-knop binnen een hub */
.hub-cta{display:flex;align-items:center;gap:12px;width:100%;border:none;cursor:pointer;font-family:var(--sans);text-align:left;color:#fff;background:linear-gradient(135deg,var(--orange) 0%,var(--orange2) 100%);border-radius:15px;padding:15px 17px;box-shadow:0 6px 18px rgba(200,98,42,.28);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;margin-bottom:10px}
.hub-cta:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(200,98,42,.42)}
.hub-cta:active{transform:scale(.98)}
.hub-cta .hci{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.22);border-radius:10px}
.hub-cta .hci svg{width:18px;height:18px}
.hub-cta .hcl{flex:1;font-size:.96rem;font-weight:600}
.hub-cta .hca{font-size:1.15rem;transition:transform .2s}
.hub-cta:hover .hca{transform:translateX(4px)}

/* knipperend nieuw-lampje */
.livebadge{display:inline-flex;align-items:center;gap:5px;background:#fbe7da;color:var(--orange2);font-size:.56rem;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase;vertical-align:middle;margin-left:5px}
.livedot{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:livepulse 1.6s ease-in-out infinite}
@keyframes livepulse{0%{box-shadow:0 0 0 0 rgba(232,131,74,.55)}70%{box-shadow:0 0 0 6px rgba(232,131,74,0)}100%{box-shadow:0 0 0 0 rgba(232,131,74,0)}}

/* entree-animatie per scherm (rustig en gestaffeld) */
@keyframes upIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.scr.on .pad>*{animation:upIn .5s cubic-bezier(.22,1,.36,1) both}
.scr.on .pad>*:nth-child(1){animation-delay:.02s}
.scr.on .pad>*:nth-child(2){animation-delay:.07s}
.scr.on .pad>*:nth-child(3){animation-delay:.12s}
.scr.on .pad>*:nth-child(4){animation-delay:.17s}
.scr.on .pad>*:nth-child(5){animation-delay:.22s}
.scr.on .pad>*:nth-child(6){animation-delay:.27s}
.scr.on .pad>*:nth-child(7){animation-delay:.32s}
.scr.on .pad>*:nth-child(n+8){animation-delay:.36s}

/* zachte glans over oranje knoppen */
.btn,.hub-cta{position:relative;overflow:hidden}
.btn::after,.hub-cta::after{content:'';position:absolute;top:0;left:-70%;width:45%;height:100%;background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);transform:skewX(-20deg);animation:shine 5s ease-in-out infinite;pointer-events:none}
@keyframes shine{0%,55%{left:-70%}78%{left:130%}100%{left:130%}}
.btn:active{transform:scale(.97)}

/* tegels, rijen en categorieen: zachte hover en druk */
.tile,.row{transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
.tile:active,.row:active,.catbtn:active,.artcard:active{transform:scale(.98)}
.catbtn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(74,25,66,.08);border-color:var(--orange)}

/* carrousel: zachte beeldzoom */
.car-img{transition:transform 6s ease}
.carousel:hover .car-img{transform:scale(1.05)}
.car-slide:active{opacity:.92}

/* onderbalk: actief-pop */
.nav-item.act .nic{animation:navpop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes navpop{0%{transform:scale(.7)}60%{transform:scale(1.12)}100%{transform:scale(1)}}

@media (prefers-reduced-motion: reduce){
 .scr.on .pad>*{animation:none!important}
 .btn::after,.hub-cta::after{display:none}
 .livedot,.nav-item.act .nic{animation:none}
 .carousel:hover .car-img{transform:none}
}

#scr-tool{flex-direction:column; overflow:hidden}
#scr-tool.on{display:flex}
.toolwrap{flex:1; min-height:0; background:#fff}
.toolwrap iframe{width:100%; height:100%; border:0; display:block}

@media (max-width:460px){
  body{padding:0;background:var(--cream)}
  .cap{display:none}
  .phone{width:100%;height:100%;border-radius:0;padding:0;box-shadow:none}
  .screen{border-radius:0}
  .island{display:none}
  .status{height:env(safe-area-inset-top,18px);padding-bottom:0}

// ===== CARROUSEL NIEUWSTE ARTIKELEN =====
var carI=0, carN=0, carTimer=null;
window.carGo=function(i){
  var t=document.getElementById('car-track'); if(!t||!carN)return;
  carI=((i%carN)+carN)%carN;
  t.style.transform='translateX(-'+(carI*100)+'%)';
  var dots=document.querySelectorAll('.car-dot');
  for(var k=0;k<dots.length;k++) dots[k].classList.toggle('act',k===carI);
};
function carBuild(list){
  var track=document.getElementById('car-track'); if(!track||!list||!list.length)return;
  carN=list.length;
  var h='',dh='';
  list.forEach(function(a,i){
    var url=(a.s&&a.s.indexOf('http')===0)?a.s:SITE+(a.s||'');
    var cat=a.c?'<span class="car-cat">'+a.c+'</span>':'';
    var dat=a.d?'<div class="d">'+a.d+'</div>':'';
    h+='<div class="car-slide" onclick="openExt(\''+url+'\')"><div class="car-imgwrap"><img class="car-img" src="'+a.i+'" alt="" loading="lazy"><div class="car-shade"></div>'+cat+'<div class="car-txt"><h3>'+a.t+'</h3>'+dat+'</div></div></div>';
    dh+='<button class="car-dot'+(i===0?' act':'')+'" onclick="carGo('+i+')" aria-label="Artikel '+(i+1)+'"></button>';
  });
  track.innerHTML=h; track.style.transform='translateX(0)'; carI=0;
  var dots=document.getElementById('car-dots'); if(dots) dots.innerHTML=dh;
  if(carTimer) clearInterval(carTimer);
  carTimer=setInterval(function(){ carGo(carI+1); },5000);
}
function renderCarousel(){
  carBuild(ARTS);
  var c=document.getElementById('carousel');
  if(c){
    c.addEventListener('mouseenter',function(){ if(carTimer){clearInterval(carTimer); carTimer=null;} });
    c.addEventListener('mouseleave',function(){ if(!carTimer) carTimer=setInterval(function(){ carGo(carI+1); },5000); });
  }
  // automatische verversing: haal de actuele lijst op van hetzelfde domein
  try{
    fetch('./articles.json',{cache:'no-store'}).then(function(r){return r.ok?r.json():null;}).then(function(j){ if(j&&j.length) carBuild(j); }).catch(function(){});
  }catch(e){}
}

// init
renderHome(); renderGids(); renderArtikelen(); renderUitgaves(); renderMenu(); renderCalc(); renderCarousel();

tick(); setInterval(tick,10000);
